name: CI Changes

on:
  push:
    branches:
      - 'chore/ci/**'
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'docs/**'
  pull_request:
    branches:
      - ci-staging
      - main
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  commit-lint:
    name: Commit Message Format
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: ./.github/workflows/ci-commit-lint.yml

  validate-branch-flow:
    name: Validate Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Validate CI branch flow
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${GITHUB_REF_NAME}" != chore/ci/* ]]; then
              echo "Pushes for this workflow must use a chore/ci/* branch."
              exit 1
            fi
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            if [[ "${GITHUB_BASE_REF}" == "ci-staging" && "${GITHUB_HEAD_REF}" != chore/ci/* ]]; then
              echo "PRs into ci-staging must come from a chore/ci/* branch."
              exit 1
            fi

            if [[ "${GITHUB_BASE_REF}" == "main" && "${GITHUB_HEAD_REF}" != "ci-staging" ]]; then
              echo "PRs into main must come from ci-staging."
              exit 1
            fi
          fi

  validate-file-scope:
    name: Validate CI File Scope
    needs: validate-branch-flow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Validate changed files are CI and docs only
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          EMPTY_TREE=4b825dc642cb6eb9a060e54bf8d69288fbee4904

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            RANGE="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            if [[ "${PUSH_BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="${EMPTY_TREE}..${PUSH_HEAD_SHA}"
            else
              RANGE="${PUSH_BEFORE_SHA}..${PUSH_HEAD_SHA}"
            fi
          else
            git fetch origin "${DEFAULT_BRANCH}" --depth=1
            RANGE="origin/${DEFAULT_BRANCH}...HEAD"
          fi

          CHANGED_FILES="$(git diff --name-only --diff-filter=ACMRT "${RANGE}" | sed '/^$/d' | sort -u)"

          if [[ -z "${CHANGED_FILES}" ]]; then
            echo "No changed files detected for ${RANGE}."
            exit 0
          fi

          echo "Changed files:"
          printf '%s\n' "${CHANGED_FILES}"

          INVALID_FILES="$(printf '%s\n' "${CHANGED_FILES}" | grep -Ev '^(\.github/workflows/|\.github/actions/|docs/)' || true)"

          if [[ -n "${INVALID_FILES}" ]]; then
            echo "Only .github/workflows/**, .github/actions/**, and docs/** may change in this workflow."
            printf '%s\n' "${INVALID_FILES}"
            exit 1
          fi

  lint-github-yaml:
    name: Lint Workflow YAML
    needs: validate-file-scope
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Check workflow and action YAML
        shell: bash
        run: |
          set -euo pipefail
          npx prettier@3 --check ".github/workflows/**/*.yml" ".github/actions/**/*.yml"

  actionlint:
    name: Actionlint
    needs: validate-file-scope
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Lint workflows
        uses: docker://rhysd/actionlint:latest
