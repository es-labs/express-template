name: Hooks CI

on:
  push:
    branches:
      - main
      - rel/**
    # paths:
    #   - 'common/**'
    #   - 'apps/**'
    #   - 'webs/**'
    #   - 'scripts/**'
  pull_request:
    branches:
      - main
      - rel/**
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Commit message format check (mirrors commit-msg hook) ────────────────
  commit-lint:
    name: Commit Message Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check commit messages
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERN='^(feat|fix|chore)(\([^)]+\))?!?: .{1,}$'
          FAILED=0
          git log --format="%s" "$BASE_SHA".."$HEAD_SHA" > /tmp/commit_msgs.txt
          while IFS= read -r msg; do
            case "$msg" in
              Merge\ *|fixup!\ *|squash!\ *) continue ;;
            esac
            if ! echo "$msg" | grep -Eq "$PATTERN"; then
              echo "::error::Non-conventional commit message: $msg"
              echo "  Expected: type(scope): description"
              echo "  Types:    feat|fix|chore"
              echo "  Note:     use chore for docs|style|refactor|perf|test|build|ci|revert changes"
              echo "  Tip:      use 'npx czg' locally to generate a valid message."
              FAILED=1
            fi
          done < /tmp/commit_msgs.txt
          exit $FAILED

  # ── Biome checks (mirrors pre-commit hook) ───────────────────────────────
  biome:
    name: Biome Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Biome CI – common/iso
        if: hashFiles('common/iso/**') != ''
        run: npx biome ci common/iso

      - name: Biome CI – common/node
        if: hashFiles('common/node/**') != ''
        run: npx biome ci common/node

      - name: Biome CI – common/vue
        if: hashFiles('common/vue/**') != ''
        run: npx biome ci common/vue

      - name: Biome CI – common/web
        if: hashFiles('common/web/**') != ''
        run: npx biome ci common/web

      - name: Biome CI – apps
        if: hashFiles('apps/**') != ''
        run: npx biome ci apps

      - name: Biome CI – webs
        if: hashFiles('webs/**') != ''
        run: npx biome ci webs

      - name: Biome CI – scripts
        if: hashFiles('scripts/**') != ''
        run: npx biome ci scripts

  # ── Schema validation tests (mirrors pre-push hook) ──────────────────────
  schema-tests:
    name: Schema Validation Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Schema tests – common/schemas
        if: hashFiles('common/schemas/**') != ''
        run: npm run test:schemas -- common/schemas

      - name: Schema tests – apps/*/schemas
        run: |
          for dir in apps/*/schemas; do
            [ -d "$dir" ] || continue
            echo "Running schema tests for $dir"
            npm run test:schemas -- "$dir"
          done

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    env:
      RELEASE_PLEASE_APP_ID: ${{ vars['RELEASE_PLEASE_APP_ID'] }}
      RELEASE_PLEASE_APP_PRIVATE_KEY: ${{ secrets['RELEASE_PLEASE_APP_PRIVATE_KEY'] }}
    steps:
      - name: Validate GitHub App configuration
        run: |
          if [[ -z "$RELEASE_PLEASE_APP_ID" ]]; then
            echo "Missing Actions variable: RELEASE_PLEASE_APP_ID"
            exit 1
          fi
          if [[ -z "$RELEASE_PLEASE_APP_PRIVATE_KEY" ]]; then
            echo "Missing Actions secret: RELEASE_PLEASE_APP_PRIVATE_KEY"
            exit 1
          fi

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ env.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ env.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          release-type: simple
