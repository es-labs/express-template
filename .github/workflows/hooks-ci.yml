name: Hooks CI

on:
  # on any push (but not to main or rel/* branches - add branch protection to prevent this)
  # push:
  # on PRs to main or rel/** branches
  # pull_request:
  #   branches:
  #     - main
  #     - rel/**
  #   # paths:
  #   #   - 'common/**'
  #   #   - 'apps/**'
  #   #   - 'webs/**'
  #   #   - 'scripts/**'
  # release:
  #   types: [published]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── Commit message format check (mirrors commit-msg hook) ────────────────
  commit-lint:
    name: Commit Message Format
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    uses: ./.github/workflows/ci-commit-lint.yml

  # ── Biome checks (mirrors pre-commit hook) ───────────────────────────────
  format-lint:
    name: Biome Checks
    uses: ./.github/workflows/ci-format-lint.yml

  # ── Schema validation tests (mirrors pre-push hook) ──────────────────────
  schema-tests:
    name: Schema Validation Tests
    needs: format-lint
    uses: ./.github/workflows/ci-tests-schema.yml

  # ── Unit tests for impacted workspaces ────────────────────────────────────
  unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/ci-tests-unit.yml


  # ── Integration tests
  integration-tests:
    name: Integration Tests
    if: github.event_name == 'pull_request'
    needs: unit-tests
    uses: ./.github/workflows/ci-tests-integration.yml

  # ── build: not needed, as there is no compiled code, frontend build is done during deployment

  # ── coverage-check: TODO

  # ── E2E tests
  e2e-tests:
    name: E2E Tests
    if: github.event_name == 'pull_request'
    needs: integration-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect touched paths
        id: touched
        uses: ./.github/actions/detect-touched-workspaces

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Run e2e tests for touched web workspaces
        if: steps.touched.outputs.has-impacted-workspaces == 'true'
        shell: bash
        run: |
          set -euo pipefail
          HAS_WEB_WORKSPACE=false

          while IFS= read -r workspace; do
            [ -n "$workspace" ] || continue
            case "$workspace" in
              webs/*)
                HAS_WEB_WORKSPACE=true
                if node -e "const p=require('./${workspace}/package.json'); process.exit(p.scripts&&p.scripts['test']?0:1)" 2>/dev/null; then
                  echo "Running e2e tests for workspace: $workspace"
                  npm run test --workspace="$workspace"
                else
                  echo "No test script in workspace: $workspace – skipping"
                fi
                ;;
            esac
          done <<< "${{ steps.touched.outputs.impacted-workspaces }}"

          if [ "$HAS_WEB_WORKSPACE" = false ]; then
            echo "No touched web workspaces detected – skipping e2e tests"
          fi

      - name: No impacted workspaces
        if: steps.touched.outputs.has-impacted-workspaces != 'true'
        run: echo "No impacted workspaces detected – skipping e2e tests"

  # ── Security scan (npm audit + secrets scan) ────────────────────────────
  security:
    name: Security Scan
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/ci-security.yml

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs:
      - format-lint
      - schema-tests
      - unit-tests
      - integration-tests
      - e2e-tests
      - security
    if: github.event_name == 'push'
    env:
      RELEASE_PLEASE_APP_ID: ${{ vars['RELEASE_PLEASE_APP_ID'] }}
      RELEASE_PLEASE_APP_PRIVATE_KEY: ${{ secrets['RELEASE_PLEASE_APP_PRIVATE_KEY'] }}
    steps:
      - name: Validate GitHub App configuration
        run: |
          if [[ -z "$RELEASE_PLEASE_APP_ID" ]]; then
            echo "Missing Actions variable: RELEASE_PLEASE_APP_ID"
            exit 1
          fi
          if [[ -z "$RELEASE_PLEASE_APP_PRIVATE_KEY" ]]; then
            echo "Missing Actions secret: RELEASE_PLEASE_APP_PRIVATE_KEY"
            exit 1
          fi

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ env.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ env.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

