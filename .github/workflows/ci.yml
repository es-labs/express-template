## Main repository CI workflow.
## Runs only for changes in apps/**, webs/**, common/**, and scripts/**.
## Excludes chore/ci branches because CI meta changes are handled by ci-meta.yml.
name: CI

on:
  # push:
  #   branches-ignore:
  #     - 'chore/ci/**'
  # pull_request:
  #   branches:
  #     - main
  #     - rel/**
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  detect-scope:
    name: Detect Change Scope
    runs-on: ubuntu-latest
    outputs:
      has-common-scripts: ${{ steps.scope.outputs.has_common_scripts }}
      has-apps-webs: ${{ steps.scope.outputs.has_apps_webs }}
      has-supported-scope: ${{ steps.scope.outputs.has_supported_scope }}
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect changed scope
        id: scope
        uses: ./.github/actions/detect-change-scope
        with:
          allowed-paths-regex: apps/|webs/|common/|scripts/
          fail-on-invalid: 'true'
          invalid-scope-message: This workflow only accepts changes in apps/**, webs/**, common/**, and scripts/**.

  commit-lint:
    name: Commit Message Format
    needs: detect-scope
    if: needs.detect-scope.outputs.has-supported-scope == 'true' && (github.event_name == 'pull_request' || github.event_name == 'push')
    uses: ./.github/workflows/call-commit-lint.yml

  format-lint:
    name: Biome Checks
    needs: detect-scope
    if: needs.detect-scope.outputs.has-supported-scope == 'true'
    uses: ./.github/workflows/call-format-lint.yml

  schema-tests:
    name: Schema Validation Tests
    needs:
      - detect-scope
      - format-lint
    if: needs.detect-scope.outputs.has-supported-scope == 'true'
    uses: ./.github/workflows/call-tests-schema.yml

  unit-tests:
    name: Unit Tests
    needs: detect-scope
    if: needs.detect-scope.outputs.has-apps-webs == 'true'
    uses: ./.github/workflows/call-tests-unit.yml

  integration-tests:
    name: Integration Tests
    needs:
      - detect-scope
      - unit-tests
    if: needs.detect-scope.outputs.has-apps-webs == 'true' && github.event_name == 'pull_request'
    uses: ./.github/workflows/call-tests-integration.yml

  e2e-tests:
    name: E2E Tests
    needs:
      - detect-scope
      - integration-tests
    if: needs.detect-scope.outputs.has-apps-webs == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./.github/actions/checkout

      - name: Detect touched paths
        id: touched
        uses: ./.github/actions/detect-touched-workspaces

      - name: Set up workspace
        uses: ./.github/actions/setup-node-npm-install

      - name: Run e2e tests for touched web workspaces
        if: steps.touched.outputs.has-impacted-workspaces == 'true'
        shell: bash
        run: |
          set -euo pipefail
          HAS_WEB_WORKSPACE=false

          while IFS= read -r workspace; do
            [ -n "$workspace" ] || continue
            case "$workspace" in
              webs/*)
                HAS_WEB_WORKSPACE=true
                if node -e "const p=require('./${workspace}/package.json'); process.exit(p.scripts&&p.scripts['test']?0:1)" 2>/dev/null; then
                  echo "Running e2e tests for workspace: $workspace"
                  npm run test --workspace="$workspace"
                else
                  echo "No test script in workspace: $workspace - skipping"
                fi
                ;;
            esac
          done <<< "${{ steps.touched.outputs.impacted-workspaces }}"

          if [ "$HAS_WEB_WORKSPACE" = false ]; then
            echo "No touched web workspaces detected - skipping e2e tests"
          fi

      - name: No impacted workspaces
        if: steps.touched.outputs.has-impacted-workspaces != 'true'
        run: echo "No impacted workspaces detected - skipping e2e tests"

  security:
    name: Security Scan
    needs: detect-scope
    if: needs.detect-scope.outputs.has-supported-scope == 'true' && github.event_name == 'pull_request'
    uses: ./.github/workflows/call-security.yml

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs:
      - detect-scope
      - format-lint
      - schema-tests
      - unit-tests
      - integration-tests
      - e2e-tests
      - security
    if: needs.detect-scope.outputs.has-supported-scope == 'true' && github.event_name == 'push'
    env:
      RELEASE_PLEASE_APP_ID: ${{ vars['RELEASE_PLEASE_APP_ID'] }}
      RELEASE_PLEASE_APP_PRIVATE_KEY: ${{ secrets['RELEASE_PLEASE_APP_PRIVATE_KEY'] }}
    steps:
      - name: Validate GitHub App configuration
        run: |
          if [[ -z "$RELEASE_PLEASE_APP_ID" ]]; then
            echo "Missing Actions variable: RELEASE_PLEASE_APP_ID"
            exit 1
          fi
          if [[ -z "$RELEASE_PLEASE_APP_PRIVATE_KEY" ]]; then
            echo "Missing Actions secret: RELEASE_PLEASE_APP_PRIVATE_KEY"
            exit 1
          fi

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ env.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ env.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
